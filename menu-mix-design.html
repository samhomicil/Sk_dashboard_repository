// ── Helpers ───────────────────────────────────────────────────────
const $ = n => n < 0
  ? `-$${Math.abs(Math.round(n)).toLocaleString()}`
  : `$${Math.round(n).toLocaleString()}`;
const pct = n => `${(n * 100).toFixed(1)}%`;
const num = n => n.toLocaleString();
const cogsColor = v => v === null ? '' : v < 0.28 ? 'text-emerald-600 font-semibold' : v < 0.35 ? 'text-amber-600 font-semibold' : 'text-red-600 font-semibold';

const CAT_COLOR = {
  'Smoothies':      { bg: 'bg-teal-500',   dot: '#14b8a6' },
  'Smoothie Bowls': { bg: 'bg-violet-500', dot: '#8b5cf6' },
  'Food':           { bg: 'bg-amber-500',  dot: '#f59e0b' },
  'Retail Products':{ bg: 'bg-blue-400',   dot: '#60a5fa' },
  'Retail Goods':   { bg: 'bg-slate-400',  dot: '#94a3b8' },
};
const CAT_ORDER = ['Smoothies', 'Smoothie Bowls', 'Food', 'Retail Products', 'Retail Goods'];

function parseSize(name) {
  const m = name.match(/^(\d+OZ|KIDS|44OZ)/i);
  return m ? m[1].toUpperCase() : name.split(' ')[0];
}
function parseFlavor(name) {
  return name.replace(/^\d+OZ\s*-\s*/i,'').replace(/^KIDS\s*-\s*/i,'').replace(/^BOWL\s*-\s*/i,'').replace(/^RETAIL\s*-\s*/i,'').trim();
}

// ── Product table ─────────────────────────────────────────────────
function productTable(rows, totalSales, showSize) {
  if (!rows.length) return '<p class="text-xs text-slate-400 py-2">No data</p>';
  return `
  <div class="overflow-x-auto">
    <table class="w-full text-xs">
      <thead>
        <tr class="text-slate-400 uppercase border-b border-slate-100">
          <th class="text-left pb-2 font-medium">Product</th>
          ${showSize ? '<th class="text-right pb-2 font-medium w-14">Size</th>' : ''}
          <th class="text-right pb-2 font-medium w-16">Units</th>
          <th class="text-right pb-2 font-medium w-20">Avg Price</th>
          <th class="text-right pb-2 font-medium w-16">COGS%</th>
          <th class="text-right pb-2 font-medium w-20">Revenue</th>
          <th class="text-right pb-2 font-medium w-14">% Mix</th>
        </tr>
      </thead>
      <tbody>
        ${rows.map(p => {
          const mix = totalSales > 0 ? p.sales / totalSales : 0;
          return `
          <tr class="border-b border-slate-50 hover:bg-slate-50">
            <td class="py-1.5 pr-2 font-medium text-slate-700 max-w-[200px] truncate">${parseFlavor(p.product)}</td>
            ${showSize ? `<td class="text-right py-1.5 text-slate-500">${parseSize(p.product)}</td>` : ''}
            <td class="text-right py-1.5 text-slate-600">${num(p.qty)}</td>
            <td class="text-right py-1.5 text-slate-600">${p.avgPrice !== null ? `$${p.avgPrice.toFixed(2)}` : '—'}</td>
            <td class="text-right py-1.5 ${cogsColor(p.cogsPct)}">${p.cogsPct !== null ? pct(p.cogsPct) : '—'}</td>
            <td class="text-right py-1.5 font-semibold text-slate-700">${$(p.sales)}</td>
            <td class="text-right py-1.5">
              <div class="flex items-center justify-end gap-1">
                <div class="w-10 h-1.5 bg-slate-100 rounded-full overflow-hidden">
                  <div class="h-full bg-teal-400 rounded-full" style="width:${Math.min(mix * 5, 1) * 100}%"></div>
                </div>
                <span class="text-slate-500 w-8 text-right">${pct(mix)}</span>
              </div>
            </td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  </div>`;
}

// ── Smoothies section with tabs ───────────────────────────────────
function smoothiesSection(products, totalSales) {
  const bySize = {};
  const byFlavor = {};
  for (const p of products) {
    const sz = parseSize(p.product);
    if (!bySize[sz]) bySize[sz] = { product: sz, qty: 0, sales: 0, cogsPct: null, avgPrice: null };
    bySize[sz].qty += p.qty; bySize[sz].sales += p.sales;

    const fl = parseFlavor(p.product);
    if (!byFlavor[fl]) byFlavor[fl] = { product: fl, qty: 0, sales: 0, cogsPct: null, avgPrice: null, _count: 0 };
    byFlavor[fl].qty += p.qty; byFlavor[fl].sales += p.sales;
    if (p.cogsPct !== null) {
      byFlavor[fl].cogsPct = byFlavor[fl].cogsPct !== null
        ? (byFlavor[fl].cogsPct * byFlavor[fl]._count + p.cogsPct) / (byFlavor[fl]._count + 1)
        : p.cogsPct;
      byFlavor[fl]._count++;
    }
  }
  const sizeRows   = Object.values(bySize).sort((a,b) => b.sales - a.sales);
  const flavorRows = Object.values(byFlavor).sort((a,b) => b.sales - a.sales).slice(0, 25);

  return `
  <div>
    <div class="flex gap-1 mb-3" id="smTabs">
      <button onclick="showSmTab('all')"    id="smTab-all"    class="px-3 py-1 text-xs rounded-full font-medium bg-teal-600 text-white">All Items</button>
      <button onclick="showSmTab('size')"   id="smTab-size"   class="px-3 py-1 text-xs rounded-full font-medium bg-slate-100 text-slate-500 hover:bg-slate-200">By Size</button>
      <button onclick="showSmTab('flavor')" id="smTab-flavor" class="px-3 py-1 text-xs rounded-full font-medium bg-slate-100 text-slate-500 hover:bg-slate-200">By Flavor</button>
    </div>
    <div id="smPane-all">${productTable(products.slice(0, 30), totalSales, true)}</div>
    <div id="smPane-size" class="hidden">${productTable(sizeRows, totalSales, false)}</div>
    <div id="smPane-flavor" class="hidden">${productTable(flavorRows, totalSales, false)}</div>
  </div>`;
}

// ── Category card ─────────────────────────────────────────────────
function categoryCard(cat, products, totalSales, isFirst) {
  const cc = CAT_COLOR[cat] ?? { bg: 'bg-slate-400', dot: '#94a3b8' };
  const catSales = products.reduce((s,p) => s + p.sales, 0);
  const catQty   = products.reduce((s,p) => s + p.qty, 0);
  const cogsItems = products.filter(p => p.cogsPct !== null);
  const avgCogs   = cogsItems.length ? cogsItems.reduce((s,p) => s + p.cogsPct, 0) / cogsItems.length : 0;
  const id = cat.replace(/\s+/g,'_');
  const inner = cat === 'Smoothies'
    ? smoothiesSection(products, totalSales)
    : productTable(products.slice(0, 25), totalSales, false);

  return `
  <div class="card">
    <button onclick="toggleCat('${id}')" class="w-full flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-2.5 h-2.5 rounded-full ${cc.bg}"></div>
        <span class="font-bold text-slate-700">${cat}</span>
        <span class="text-sm text-slate-400">${products.length} items</span>
      </div>
      <div class="flex items-center gap-6 text-sm">
        <div class="text-right hidden sm:block">
          <div class="text-xs text-slate-400">Units / Day</div>
          <div class="font-semibold text-slate-700">${(catQty / 90).toFixed(1)}</div>
        </div>
        ${avgCogs > 0 ? `
        <div class="text-right hidden sm:block">
          <div class="text-xs text-slate-400">Avg COGS%</div>
          <div class="font-semibold ${avgCogs < 0.28 ? 'text-emerald-600' : 'text-amber-600'}">${pct(avgCogs)}</div>
        </div>` : ''}
        <div class="text-right">
          <div class="text-xs text-slate-400">Revenue</div>
          <div class="font-bold text-slate-800">${$(catSales)}</div>
        </div>
        <span class="text-slate-400 text-xs" id="arrow-${id}">${isFirst ? '▲' : '▼'}</span>
      </div>
    </button>
    <div id="body-${id}" class="${isFirst ? '' : 'hidden'} mt-4 pt-4 border-t border-slate-100">
      ${inner}
    </div>
  </div>`;
}

// ── Modifiers card ────────────────────────────────────────────────
function modifiersCard(mods, coreUnits) {
  const modTotal = mods.reduce((s,m) => s + m.sales, 0);
  const modUnits = mods.reduce((s,m) => s + m.qty, 0);
  const attach   = coreUnits > 0 ? modUnits / coreUnits : 0;
  return `
  <div class="card">
    <div class="flex items-center justify-between mb-3">
      <div>
        <div class="font-bold text-slate-700">Add-Ons (Modifiers)</div>
        <div class="text-xs text-slate-400 mt-0.5">Not included in category mix — tracked separately</div>
      </div>
      <div class="flex gap-6 text-sm text-right">
        <div>
          <div class="text-xs text-slate-400">Attach Rate</div>
          <div class="font-bold text-slate-700">${pct(attach)}</div>
          <div class="text-xs text-slate-400">add-ons / units sold</div>
        </div>
        <div>
          <div class="text-xs text-slate-400">Revenue</div>
          <div class="font-bold text-slate-700">${$(modTotal)}</div>
        </div>
      </div>
    </div>
    <div class="overflow-x-auto">
      <table class="w-full text-xs">
        <thead>
          <tr class="text-slate-400 uppercase border-b border-slate-100">
            <th class="text-left pb-2 font-medium">Add-On</th>
            <th class="text-right pb-2 font-medium w-16">Units</th>
            <th class="text-right pb-2 font-medium w-16">Attach%</th>
            <th class="text-right pb-2 font-medium w-16">COGS%</th>
            <th class="text-right pb-2 font-medium w-20">Revenue</th>
          </tr>
        </thead>
        <tbody>
          ${mods.map(m => `
          <tr class="border-b border-slate-50 hover:bg-slate-50">
            <td class="py-1.5 font-medium text-slate-700">${m.product.replace(/^CHOICE\s*-\s*/,'').replace(/^Add On\s*-\s*/,'')}</td>
            <td class="text-right py-1.5 text-slate-600">${num(m.qty)}</td>
            <td class="text-right py-1.5 text-slate-600">${coreUnits > 0 ? pct(m.qty / coreUnits) : '—'}</td>
            <td class="text-right py-1.5 ${cogsColor(m.cogsPct)}">${m.cogsPct !== null ? pct(m.cogsPct) : '—'}</td>
            <td class="text-right py-1.5 font-semibold text-slate-700">${m.sales > 0 ? $(m.sales) : '—'}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
  </div>`;
}

// ── Render ────────────────────────────────────────────────────────
function render() {
  const d = DATA;
  const coreCats = d.categories.filter(c => c.subcategory !== 'Discounts' && c.sales > 0);
  const coreTotal = coreCats.reduce((s,c) => s + c.sales, 0);
  const coreUnits = coreCats.reduce((s,c) => s + c.qty, 0);

  const mixBar = coreCats.map(c => {
    const cc = CAT_COLOR[c.subcategory] ?? { bg: 'bg-slate-400' };
    return `<div class="${cc.bg} transition-all" style="width:${pct(c.pctOfTotal)}" title="${c.subcategory}: ${pct(c.pctOfTotal)}"></div>`;
  }).join('');

  const catCircles = coreCats.map(c => {
    const cc = CAT_COLOR[c.subcategory] ?? { bg: 'bg-slate-400' };
    return `
    <div class="text-center">
      <div class="w-10 h-10 rounded-full mx-auto mb-2 flex items-center justify-center ${cc.bg}">
        <span class="text-white text-xs font-bold">${(c.pctOfTotal * 100).toFixed(0)}%</span>
      </div>
      <div class="text-xs font-semibold text-slate-700">${c.subcategory}</div>
      <div class="text-base font-bold text-slate-800">${pct(c.pctOfTotal)}</div>
      <div class="text-xs text-slate-400">${$(c.sales)} · ${num(c.qty)} units</div>
    </div>`;
  }).join('');

  const catCards = CAT_ORDER.map((cat, i) => {
    const products = d.products[cat] ?? [];
    if (!products.length) return '';
    return categoryCard(cat, products, coreTotal, i === 0);
  }).join('');

  document.getElementById('app').innerHTML = `
  <div class="min-h-screen bg-slate-50 p-4 md:p-6">

    <!-- Header -->
    <div class="flex flex-wrap items-center justify-between gap-3 mb-6">
      <div>
        <h1 class="text-xl font-bold text-slate-800">Menu Mix &amp; Velocity</h1>
        <p class="text-xs text-slate-400 mt-0.5">Data through ${d.thruDate} · L90D · All Stores</p>
      </div>
      <div class="flex gap-2">
        <div class="flex rounded-lg border border-slate-200 overflow-hidden bg-white">
          <button class="px-3 py-1.5 text-xs font-medium text-slate-500">MTD</button>
          <button class="px-3 py-1.5 text-xs font-medium text-slate-500">Last Month</button>
          <button class="px-3 py-1.5 text-xs font-medium bg-slate-800 text-white">Last 90 Days</button>
        </div>
        <div class="flex rounded-lg border border-slate-200 overflow-hidden bg-white">
          <button class="px-3 py-1.5 text-xs font-medium bg-slate-800 text-white">All Stores</button>
          <button class="px-3 py-1.5 text-xs font-medium text-slate-500">Pines</button>
          <button class="px-3 py-1.5 text-xs font-medium text-slate-500">Miramar</button>
          <button class="px-3 py-1.5 text-xs font-medium text-slate-500">Margate</button>
        </div>
      </div>
    </div>

    <div class="space-y-4">

      <!-- Category Mix Summary -->
      <div class="card">
        <div class="text-sm font-bold text-slate-700 mb-4">Category Mix</div>
        <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-4">
          ${catCircles}
        </div>
        <div class="flex h-3 rounded-full overflow-hidden gap-px">
          ${mixBar}
        </div>
        <div class="mt-2 text-xs text-slate-400 text-right">
          Core total: ${$(coreTotal)} · ${num(coreUnits)} units — Modifiers &amp; Discounts excluded from mix %
        </div>
      </div>

      <!-- Category drill-downs -->
      ${catCards}

      <!-- Modifiers -->
      ${modifiersCard(d.modifiers, coreUnits)}

    </div>
  </div>`;
}

// ── Interactivity ─────────────────────────────────────────────────
function toggleCat(id) {
  const body  = document.getElementById('body-' + id);
  const arrow = document.getElementById('arrow-' + id);
  body.classList.toggle('hidden');
  arrow.textContent = body.classList.contains('hidden') ? '▼' : '▲';
}

let _smTab = 'all';
function showSmTab(tab) {
  ['all','size','flavor'].forEach(t => {
    document.getElementById('smPane-' + t).classList.toggle('hidden', t !== tab);
    const btn = document.getElementById('smTab-' + t);
    if (t === tab) { btn.classList.remove('bg-slate-100','text-slate-500'); btn.classList.add('bg-teal-600','text-white'); }
    else           { btn.classList.add('bg-slate-100','text-slate-500');    btn.classList.remove('bg-teal-600','text-white'); }
  });
  _smTab = tab;
}

render();
</script>
</body>
</html>
