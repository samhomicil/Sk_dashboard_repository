// ── Helpers ───────────────────────────────────────────────────────
const money  = n => n < 0 ? `-$${Math.abs(Math.round(n)).toLocaleString()}` : `$${Math.round(n).toLocaleString()}`;
const money2 = n => `$${n.toFixed(2)}`;
const pct  = n => `${(n*100).toFixed(1)}%`;
const num  = n => n.toLocaleString();
const cogsColor = v => v===null ? '' : v<0.28 ? 'text-emerald-600 font-semibold' : v<0.35 ? 'text-amber-600 font-semibold' : 'text-rose-600 font-semibold';

const CAT_COLOR = {
  'Smoothies':      { bg:'bg-teal-500',   dot:'#14b8a6' },
  'Smoothie Bowls': { bg:'bg-violet-500', dot:'#8b5cf6' },
  'Food':           { bg:'bg-amber-500',  dot:'#f59e0b' },
  'Retail Products':{ bg:'bg-sky-400',    dot:'#38bdf8' },
  'Retail Goods':   { bg:'bg-slate-400',  dot:'#94a3b8' },
  'Modifiers':      { bg:'bg-rose-400',   dot:'#fb7185' },
};
const CAT_ORDER = ['Smoothies','Smoothie Bowls','Food','Retail Products','Retail Goods'];
const CAT_SHORT = {'Smoothies':'Smoothie','Smoothie Bowls':'Bowl','Food':'Food','Retail Products':'Retail','Retail Goods':'Retail','Modifiers':'Add-On'};
const catDot = s => (CAT_COLOR[s]||{dot:'#94a3b8'}).dot;

const parseSize = name => { const m = name.match(/^(\d+OZ|KIDS|44OZ)/i); return m ? m[1].toUpperCase() : name.split(' ')[0]; };
const parseFlavor = name => name.replace(/^\d+OZ\s*-\s*/i,'').replace(/^KIDS\s*-\s*/i,'').replace(/^BOWL\s*-\s*/i,'').replace(/^RETAIL\s*-\s*/i,'').replace(/^CHOICE\s*-\s*/i,'').replace(/^Add On\s*-\s*/i,'').replace(/^Sub\s*-\s*/i,'').trim();

function blendedCogs(prods) {
  let rev=0, cost=0;
  for (const p of prods) if (p.cogsPct!=null) { rev+=p.sales; cost+=p.sales*p.cogsPct; }
  return rev>0 ? cost/rev : null;
}

// ── Category metrics table ────────────────────────────────────────
function categoryMetricsTable(coreCats, coreTotal, coreUnits) {
  const head = ['Category','Revenue','% Mix','Units','Units/Day','Avg Price','COGS%','Margin%'];
  const rows = coreCats.map(c => {
    const cogs = blendedCogs(DATA.products[c.subcategory] ?? []);
    const margin = cogs!=null ? 1-cogs : null;
    return `<tr class="border-b border-slate-50 hover:bg-slate-50">
      <td class="py-2 font-medium text-slate-700"><span class="inline-block w-2.5 h-2.5 rounded-sm mr-2 align-middle" style="background:${catDot(c.subcategory)}"></span>${c.subcategory}</td>
      <td class="py-2 text-right font-semibold text-slate-700 tabular-nums">${money(c.sales)}</td>
      <td class="py-2 text-right text-slate-500 tabular-nums">${pct(c.sales/coreTotal)}</td>
      <td class="py-2 text-right text-slate-600 tabular-nums">${num(c.qty)}</td>
      <td class="py-2 text-right text-slate-600 tabular-nums">${(c.qty/90).toFixed(1)}</td>
      <td class="py-2 text-right text-slate-600 tabular-nums">${money2(c.sales/c.qty)}</td>
      <td class="py-2 text-right tabular-nums ${cogsColor(cogs)}">${cogs!=null?pct(cogs):'—'}</td>
      <td class="py-2 text-right font-medium tabular-nums ${margin!=null?(margin>0.72?'text-emerald-600':'text-amber-600'):''}">${margin!=null?pct(margin):'—'}</td>
    </tr>`;
  }).join('');
  const totCogs = blendedCogs(CAT_ORDER.flatMap(c => DATA.products[c] ?? []));
  const totMargin = totCogs!=null ? 1-totCogs : null;
  const totalRow = `<tr class="border-t-2 border-slate-200 font-bold text-slate-800">
      <td class="py-2">Core total</td>
      <td class="py-2 text-right tabular-nums">${money(coreTotal)}</td>
      <td class="py-2 text-right tabular-nums">100%</td>
      <td class="py-2 text-right tabular-nums">${num(coreUnits)}</td>
      <td class="py-2 text-right tabular-nums">${(coreUnits/90).toFixed(1)}</td>
      <td class="py-2 text-right tabular-nums">${money2(coreTotal/coreUnits)}</td>
      <td class="py-2 text-right tabular-nums">${totCogs!=null?pct(totCogs):'—'}</td>
      <td class="py-2 text-right tabular-nums">${totMargin!=null?pct(totMargin):'—'}</td>
    </tr>`;
  return `<div class="overflow-x-auto"><table class="w-full text-xs">
    <thead><tr class="text-slate-400 uppercase border-b border-slate-100">
      ${head.map((h,i)=>`<th class="pb-2 font-medium ${i===0?'text-left':'text-right'}">${h}</th>`).join('')}
    </tr></thead><tbody>${rows}${totalRow}</tbody></table></div>`;
}

function tsRows(items, metric) {
  return items.map((i,idx) => {
    const unitsActive = metric==='qty';
    const cat = i.subcategory;
    return `<tr class="border-b border-slate-50 hover:bg-slate-50">
      <td class="py-1.5 text-slate-300 tabular-nums">${idx+1}</td>
      <td class="py-1.5 pr-2 font-medium text-slate-700 max-w-[230px] truncate" title="${i.product}">${parseFlavor(i.product)}</td>
      <td class="py-1.5 text-slate-500 hidden sm:table-cell"><span class="inline-block w-2 h-2 rounded-sm mr-1.5 align-middle" style="background:${catDot(cat)}"></span>${CAT_SHORT[cat]||cat}</td>

}

function paintTopSellers() {
  Object.keys(TS_CATS).forEach(c => { const b=document.getElementById('tsCat-'+c); if(b) b.className = c===_tsCat?tsPillOn:tsPillOff; });
  ['qty','sales'].forEach(mt => {
    const b=document.getElementById('tsSort-'+mt); if(!b) return;
    b.className = 'px-2.5 py-1 rounded-md font-medium ' + (mt===_tsSort ? 'bg-slate-800 text-white' : 'text-slate-500 hover:bg-slate-100');
  });
  const rows = [...TS_CATS[_tsCat]()].sort((a,b)=>b[_tsSort]-a[_tsSort]).slice(0,10);
  document.getElementById('ts-body').innerHTML = tsRows(rows, _tsSort);
}
function tsSet(c){ _tsCat=c; paintTopSellers(); }
function tsSortBy(m){ _tsSort=m; paintTopSellers(); }

// ── Sortable / searchable table system ────────────────────────────
const TABLES = {};
function makeTable(key, rows, opts={}) {
  TABLES[key] = { rows, cols:opts.cols, totalSales:opts.totalSales||0,
    sortKey:opts.sortKey||'sales', sortDir:opts.sortDir||'desc',
    query:'', search:opts.search!==false && rows.length>=8 };
  return tableSkeleton(key);
}
function tableSkeleton(key) {
  const t = TABLES[key];
  const search = t.search ? `
    <div class="relative mb-3 max-w-xs">
      <svg class="w-3.5 h-3.5 absolute left-2.5 top-1/2 -translate-y-1/2 text-slate-300" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input class="search w-full pl-8 pr-3 py-1.5 text-xs rounded-lg border border-slate-200 bg-slate-50" placeholder="Search items…" oninput="searchTable('${key}', this.value)">
    </div>` : '';
  return `${search}<div class="overflow-x-auto"><table class="w-full text-xs">
    <thead id="thead-${key}">${theadHtml(key)}</thead>
    <tbody id="tbody-${key}">${tbodyHtml(key)}</tbody></table></div>`;
}
function theadHtml(key) {
  const t = TABLES[key];
  return `<tr class="text-slate-400 uppercase border-b border-slate-100">` + t.cols.map(c => {
    const active = c.key===t.sortKey;
    const arrow = !c.sortable ? '' : active ? (t.sortDir==='desc'?' ↓':' ↑') : '';
    const cls = `pb-2 font-medium ${c.align==='right'?'text-right':'text-left'} ${c.width||''} ${c.sortable?'sortable':''} ${active?'text-slate-600':''}`;
    const click = c.sortable ? `onclick="sortTable('${key}','${c.key}')"` : '';
    return `<th class="${cls}" ${click}>${c.label}<span class="text-teal-500">${arrow}</span></th>`;
  }).join('') + `</tr>`;
}
function tbodyHtml(key) {
  const t = TABLES[key];
  let rows = t.rows;
  if (t.query) { const q=t.query.toLowerCase(); rows = rows.filter(r => (r.product||'').toLowerCase().includes(q)); }
  rows = sortRows(rows, t.sortKey, t.sortDir);
  if (!rows.length) return `<tr><td colspan="${t.cols.length}" class="py-4 text-center text-slate-300">No matching items</td></tr>`;
  return rows.map(r => `<tr class="border-b border-slate-50 hover:bg-slate-50">` +
    t.cols.map(c => `<td class="py-1.5 ${c.align==='right'?'text-right':''} ${c.cell?c.cell(r):''}">${c.render(r,t)}</td>`).join('') + `</tr>`).join('');
}
function sortRows(rows, key, dir) {
  return [...rows].sort((a,b) => {
    if (key==='product') { const va=(a.product||'').toLowerCase(), vb=(b.product||'').toLowerCase();
      return dir==='asc' ? va.localeCompare(vb) : vb.localeCompare(va); }
    let va = key==='mix' ? a.sales : (key==='perDay' ? a.qty : a[key]);
    let vb = key==='mix' ? b.sales : (key==='perDay' ? b.qty : b[key]);
    const na = va===null||va===undefined, nb = vb===null||vb===undefined;
    if (na&&nb) return 0; if (na) return 1; if (nb) return -1;
    return dir==='asc' ? va-vb : vb-va;
  });
}
function sortTable(key, col) {
  const t = TABLES[key];
  if (t.sortKey===col) t.sortDir = t.sortDir==='desc'?'asc':'desc';
  else { t.sortKey=col; t.sortDir = col==='product'?'asc':'desc'; }
  document.getElementById('thead-'+key).innerHTML = theadHtml(key);
  document.getElementById('tbody-'+key).innerHTML = tbodyHtml(key);
}
function searchTable(key, val) { TABLES[key].query = val; document.getElementById('tbody-'+key).innerHTML = tbodyHtml(key); }

// ── Column definitions ────────────────────────────────────────────
function productCols(showSize) {
  const cols = [{ key:'product', label:'Product', align:'left', sortable:true,
    cell:()=>'pr-2 max-w-[210px] truncate',
    render:r=>`<span class="font-medium text-slate-700">${parseFlavor(r.product)}</span>` }];
  if (showSize) cols.push({ key:'_size', label:'Size', align:'right', width:'w-12', sortable:false,
    render:r=>`<span class="text-slate-500">${parseSize(r.product)}</span>` });
  cols.push(
    { key:'qty', label:'Units', align:'right', width:'w-14', sortable:true,
      render:r=>`<span class="text-slate-600 tabular-nums">${num(r.qty)}</span>` },
    { key:'perDay', label:'Units/Day', align:'right', width:'w-16', sortable:true,
      render:r=>`<span class="text-slate-600 tabular-nums">${(r.qty/90).toFixed(1)}</span>` },
    { key:'avgPrice', label:'Avg Price', align:'right', width:'w-20', sortable:true,
      render:r=>`<span class="text-slate-600 tabular-nums">${r.avgPrice!=null?money2(r.avgPrice):'—'}</span>` },
    { key:'cogsPct', label:'COGS%', align:'right', width:'w-16', sortable:true,
      render:r=>`<span class="tabular-nums ${cogsColor(r.cogsPct)}">${r.cogsPct!=null?pct(r.cogsPct):'—'}</span>` },
    { key:'sales', label:'Revenue', align:'right', width:'w-20', sortable:true,
      render:r=>`<span class="font-semibold text-slate-700 tabular-nums">${money(r.sales)}</span>` },
    { key:'mix', label:'% Mix', align:'right', width:'w-16', sortable:true,
      render:(r,t)=>{ const mix=t.totalSales>0?r.sales/t.totalSales:0; return `<span class="text-slate-500 tabular-nums">${pct(mix)}</span>`; } }
  );
  return cols;
}
function modifierCols(coreUnits) {
  return [
    { key:'product', label:'Add-On', align:'left', sortable:true,
      render:r=>`<span class="font-medium text-slate-700">${parseFlavor(r.product)}</span>` },
    { key:'qty', label:'Units', align:'right', width:'w-16', sortable:true,
      render:r=>`<span class="text-slate-600 tabular-nums">${num(r.qty)}</span>` },
    { key:'perDay', label:'Units/Day', align:'right', width:'w-16', sortable:true,
      render:r=>`<span class="text-slate-600 tabular-nums">${(r.qty/90).toFixed(1)}</span>` },
    { key:'attach', label:'Attach%', align:'right', width:'w-16', sortable:true,
      render:r=>`<span class="text-slate-600 tabular-nums">${coreUnits>0?pct(r.qty/coreUnits):'—'}</span>` },
    { key:'cogsPct', label:'COGS%', align:'right', width:'w-16', sortable:true,
      render:r=>`<span class="tabular-nums ${cogsColor(r.cogsPct)}">${r.cogsPct!=null?pct(r.cogsPct):'—'}</span>` },
    { key:'sales', label:'Revenue', align:'right', width:'w-20', sortable:true,
      render:r=>`<span class="font-semibold text-slate-700 tabular-nums">${r.sales>0?money(r.sales):'—'}</span>` },
  ];
}

// ── Smoothies section with tabs ───────────────────────────────────
function smoothiesSection(products, totalSales) {
  const bySize={}, byFlavor={};
  for (const p of products) {
    const sz = parseSize(p.product);
    (bySize[sz] ||= {product:sz, qty:0, sales:0, cogsPct:null, avgPrice:null});
    bySize[sz].qty+=p.qty; bySize[sz].sales+=p.sales;
    const fl = parseFlavor(p.product);
    (byFlavor[fl] ||= {product:fl, qty:0, sales:0, cogsPct:null, avgPrice:null, _c:0});
    byFlavor[fl].qty+=p.qty; byFlavor[fl].sales+=p.sales;
    if (p.cogsPct!=null) {
      byFlavor[fl].cogsPct = byFlavor[fl].cogsPct!=null
        ? (byFlavor[fl].cogsPct*byFlavor[fl]._c + p.cogsPct)/(byFlavor[fl]._c+1) : p.cogsPct;
      byFlavor[fl]._c++;
    }
  }
  const sizeRows   = Object.values(bySize).sort((a,b)=>b.sales-a.sales);
  const flavorRows = Object.values(byFlavor).sort((a,b)=>b.sales-a.sales);
  const tAll    = makeTable('sm_all', products, {cols:productCols(true), totalSales});
  const tSize   = makeTable('sm_size', sizeRows, {cols:productCols(false), totalSales, search:false});
  const tFlavor = makeTable('sm_flavor', flavorRows, {cols:productCols(false), totalSales});
  return `
  <div>
    <div class="flex gap-1 mb-3">
      <button onclick="showSmTab('all')"    id="smTab-all"    class="px-3 py-1 text-xs rounded-full font-medium bg-teal-600 text-white">All Items</button>
      <button onclick="showSmTab('size')"   id="smTab-size"   class="px-3 py-1 text-xs rounded-full font-medium bg-slate-100 text-slate-500 hover:bg-slate-200">By Size</button>
      <button onclick="showSmTab('flavor')" id="smTab-flavor" class="px-3 py-1 text-xs rounded-full font-medium bg-slate-100 text-slate-500 hover:bg-slate-200">By Flavor</button>
    </div>
    <div id="smPane-all">${tAll}</div>
    <div id="smPane-size" class="hidden">${tSize}</div>
    <div id="smPane-flavor" class="hidden">${tFlavor}</div>
  </div>`;
}

// ── Category card ─────────────────────────────────────────────────
function categoryCard(cat, products, totalSales) {
  const cc = CAT_COLOR[cat] ?? {bg:'bg-slate-400'};
  const catSales = products.reduce((s,p)=>s+p.sales,0);
  const catQty   = products.reduce((s,p)=>s+p.qty,0);
  const cogs = blendedCogs(products);
  const id = cat.replace(/\s+/g,'_');
  const inner = cat==='Smoothies'
    ? smoothiesSection(products, totalSales)
    : makeTable('cat_'+id, products, {cols:productCols(false), totalSales});
  return `
  <div class="card">
    <button onclick="toggleCat('${id}')" class="w-full flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-2.5 h-2.5 rounded-full ${cc.bg}"></div>
        <span class="font-bold text-slate-700">${cat}</span>
        <span class="text-sm text-slate-400">${products.length} items</span>
      </div>
      <div class="flex items-center gap-6 text-sm">
        <div class="text-right hidden sm:block">
          <div class="text-xs text-slate-400">Units / Day</div>
          <div class="font-semibold text-slate-700 tabular-nums">${(catQty/90).toFixed(1)}</div>
        </div>
        ${cogs!=null ? `<div class="text-right hidden sm:block">
          <div class="text-xs text-slate-400">Avg COGS%</div>
          <div class="font-semibold tabular-nums ${cogs<0.28?'text-emerald-600':'text-amber-600'}">${pct(cogs)}</div>
        </div>` : ''}
        <div class="text-right">
          <div class="text-xs text-slate-400">Revenue</div>
          <div class="font-bold text-slate-800 tabular-nums">${money(catSales)}</div>
        </div>
        <span class="text-slate-400 text-xs" id="arrow-${id}">▼</span>
      </div>
    </button>
    <div id="body-${id}" class="hidden mt-4 pt-4 border-t border-slate-100">${inner}</div>
  </div>`;
}

// ── Modifiers card ────────────────────────────────────────────────
function modifiersCard(mods, coreUnits) {
  const modTotal = mods.reduce((s,m)=>s+m.sales,0);
  const modUnits = mods.reduce((s,m)=>s+m.qty,0);
  const attach = coreUnits>0 ? modUnits/coreUnits : 0;
  const rows = mods.map(m => ({...m, attach: coreUnits>0 ? m.qty/coreUnits : 0}));
  const tbl = makeTable('mods', rows, {cols:modifierCols(coreUnits), sortKey:'qty', sortDir:'desc'});
  return `
  <div class="card">
    <button onclick="toggleCat('mods')" class="w-full flex items-center justify-between">
      <div class="text-left">
        <div class="font-bold text-slate-700">Add-Ons (Modifiers)</div>
        <div class="text-xs text-slate-400 mt-0.5">Not included in category mix — tracked separately</div>
      </div>
      <div class="flex items-center gap-6 text-sm text-right">
        <div><div class="text-xs text-slate-400">Attach Rate</div><div class="font-bold text-slate-700 tabular-nums">${pct(attach)}</div></div>
        <div><div class="text-xs text-slate-400">Revenue</div><div class="font-bold text-slate-700 tabular-nums">${money(modTotal)}</div></div>
        <span class="text-slate-400 text-xs" id="arrow-mods">▼</span>
      </div>
    </button>
    <div id="body-mods" class="hidden mt-4 pt-4 border-t border-slate-100">${tbl}</div>
  </div>`;
}

// ── Day-part / weekday (empty state — no time dimension in feed) ──
function dayPartCard() {
  return `
  <div class="card border-2 border-dashed border-slate-200" style="box-shadow:none;background:#f8fafc">
    <div class="flex items-start gap-3">
      <svg class="w-5 h-5 text-slate-300 mt-0.5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
      <div>
        <div class="font-bold text-slate-600">Day-Part &amp; Weekday Trends</div>
        <div class="text-sm text-slate-500 mt-1 max-w-2xl">This view is built on L90D product <em>totals</em>, which don't carry a time-of-day or weekday dimension. Connect an order-level feed with timestamps and this section will populate with morning / midday / afternoon / evening mix and a day-of-week breakdown per product and category.</div>
      </div>
    </div>
  </div>`;
}

// ── Render ────────────────────────────────────────────────────────
function render() {
  const d = DATA;
  const coreCats  = CAT_ORDER.map(c => d.categories.find(x => x.subcategory===c)).filter(c => c && c.sales>0);
  const coreTotal = coreCats.reduce((s,c)=>s+c.sales,0);
  const coreUnits = coreCats.reduce((s,c)=>s+c.qty,0);

  const catCards = CAT_ORDER.map(cat => {
    const products = d.products[cat] ?? [];
    return products.length ? categoryCard(cat, products, coreTotal) : '';
  }).join('');

  document.getElementById('app').innerHTML = `
  <div class="min-h-screen bg-slate-100 p-4 md:p-6 max-w-6xl mx-auto">

    <div class="flex flex-wrap items-center justify-between gap-3 mb-6">
      <div class="flex items-center gap-3">
        <img src="sk-logo.svg" alt="Smoothie King" class="h-9 w-auto shrink-0" onerror="this.style.display='none'">
        <div class="border-l border-slate-200 pl-3">
          <h1 class="text-xl font-bold text-slate-800">Menu Mix &amp; Velocity</h1>
          <p class="text-xs text-slate-400 mt-0.5">Data through ${d.thruDate} · L90D · All Stores</p>
        </div>
      </div>
      <div class="flex gap-2">
        <div class="flex rounded-lg border border-slate-200 overflow-hidden bg-white">
          <button class="px-3 py-1.5 text-xs font-medium text-slate-500">Weekly</button>
          <button class="px-3 py-1.5 text-xs font-medium text-slate-500">MTD</button>
          <button class="px-3 py-1.5 text-xs font-medium text-slate-500">Last Month</button>
          <button class="px-3 py-1.5 text-xs font-medium bg-slate-800 text-white">Last 90 Days</button>
        </div>
        <div class="flex rounded-lg border border-slate-200 overflow-hidden bg-white">
          <button class="px-3 py-1.5 text-xs font-medium bg-slate-800 text-white">All Stores</button>
          <button class="px-3 py-1.5 text-xs font-medium text-slate-500">Pines</button>
          <button class="px-3 py-1.5 text-xs font-medium text-slate-500">Miramar</button>
          <button class="px-3 py-1.5 text-xs font-medium text-slate-500">Margate</button>
        </div>
      </div>
    </div>

    <div class="space-y-4">

      <div class="card">
        <div class="flex items-baseline justify-between mb-4">
          <div class="text-sm font-bold text-slate-700">Category Mix</div>
          <div class="text-xs text-slate-400">Revenue, units &amp; margin by category</div>
        </div>
        ${categoryMetricsTable(coreCats, coreTotal, coreUnits)}
        <div class="mt-2 text-xs text-slate-400">COGS% &amp; Margin% are blended across cost-tracked items · modifiers &amp; discounts excluded from mix %</div>
      </div>

      ${topSellersCard()}

      ${dayPartCard()}

      <div>
        <div class="text-xs font-semibold uppercase tracking-wide text-slate-400 mb-2">Drill Down</div>
        <div class="space-y-4">${catCards}</div>
      </div>

      ${modifiersCard(d.modifiers, coreUnits)}

    </div>
  </div>`;

  paintTopSellers();
}

// ── Interactivity ─────────────────────────────────────────────────
function toggleCat(id) {
  const body = document.getElementById('body-'+id);
  const arrow = document.getElementById('arrow-'+id);
  body.classList.toggle('hidden');
  arrow.textContent = body.classList.contains('hidden') ? '▼' : '▲';
}
function showSmTab(tab) {
  ['all','size','flavor'].forEach(t => {
    document.getElementById('smPane-'+t).classList.toggle('hidden', t!==tab);
    const btn = document.getElementById('smTab-'+t);
    if (t===tab) { btn.classList.remove('bg-slate-100','text-slate-500'); btn.classList.add('bg-teal-600','text-white'); }
    else { btn.classList.add('bg-slate-100','text-slate-500'); btn.classList.remove('bg-teal-600','text-white'); }
  });
}

render();
</script>
